<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="World Cup Predictor  projected bracket and championship odds for FIFA World Cup 2026">
  <defs>
    <linearGradient id="pitch" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f4d3a" />
      <stop offset="50%" stop-color="#245842" />
      <stop offset="100%" stop-color="#183a2c" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f2d56b" />
      <stop offset="100%" stop-color="#d4a72c" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#pitch)" />

  <!-- Pitch stripes -->
  <g opacity="0.12" fill="#ffffff">
    <rect x="0" y="0" width="1200" height="78.75" />
    <rect x="0" y="157.5" width="1200" height="78.75" />
    <rect x="0" y="315" width="1200" height="78.75" />
    <rect x="0" y="472.5" width="1200" height="78.75" />
  </g>

  <!-- Center circle -->
  <circle cx="600" cy="315" r="92" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="4" />
  <line x1="600" y1="40" x2="600" y2="590" stroke="#ffffff" stroke-opacity="0.18" stroke-width="4" />

  <!-- Card -->
  <rect x="120" y="130" width="960" height="370" rx="28" fill="#000000" fill-opacity="0.22" stroke="#ffffff" stroke-opacity="0.14" />

  <text x="600" y="210" text-anchor="middle" fill="url(#gold)" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" letter-spacing="6">
    WORLD CUP 2026
  </text>

  <text x="600" y="300" text-anchor="middle" fill="#f5f7f2" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="800">
    World Cup Predictor
  </text>

  <text x="600" y="370" text-anchor="middle" fill="#d8e5dc" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="500">
    Projected bracket · Championship odds · Live standings
  </text>

  <text x="600" y="430" text-anchor="middle" fill="#9eb5a6" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="500">
    Monte Carlo simulations from current results and FIFA ratings
  </text>
</svg>
